name: 카드뉴스 렌더

on:
  push:
    paths:
      - 'content/**'
      - 'render.mjs'
      - 'templates/**'
  workflow_dispatch:

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 의존성 설치 (Playwright + 크로미움)
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: 한국어 폰트 설치 (Pretendard / Noto Sans KR)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk
          mkdir -p ~/.fonts
          curl -fsSL -o /tmp/pretendard.zip https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip || true
          if [ -f /tmp/pretendard.zip ]; then unzip -o /tmp/pretendard.zip -d /tmp/pretendard >/dev/null && find /tmp/pretendard -name '*.otf' -o -name '*.ttf' | xargs -I{} cp {} ~/.fonts/ 2>/dev/null || true; fi
          fc-cache -f
      - name: 카드 렌더
        run: node render.mjs
      - name: 결과 업로드 (다운로드용 아티팩트)
        uses: actions/upload-artifact@v4
        with:
          name: cards
          path: output/**
          if-no-files-found: error
          retention-days: 30
