name: 인스타 자동 게시

# content/ 에 새 카드뉴스 JSON 이 main 에 올라오면 → 렌더 → 이미지 공개(cards-cdn) → 인스타 캐러셀 자동 게시.
# 수동 실행(workflow_dispatch) 시 특정 파일 하나만 게시할 수 있다(첫 테스트용).
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
  workflow_dispatch:
    inputs:
      issue:
        description: '게시할 content 파일 경로 (예: content/2026-W26-구독다이어트.json). 비우면 이번 푸시의 신규 추가분.'
        required: false

permissions:
  contents: write

concurrency:
  group: ig-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 의존성 설치 (Playwright + 크로미움)
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: 한국어 폰트 설치 (Pretendard / Noto Sans KR)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
          mkdir -p ~/.fonts
          curl -fsSL -o /tmp/pretendard.zip https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip || true
          if [ -f /tmp/pretendard.zip ]; then unzip -o /tmp/pretendard.zip -d /tmp/pretendard >/dev/null && find /tmp/pretendard -name '*.otf' -o -name '*.ttf' | xargs -I{} cp {} ~/.fonts/ 2>/dev/null || true; fi
          fc-cache -f

      - name: 게시 대상 결정
        id: target
        run: |
          IN="${{ github.event.inputs.issue }}"
          FILES=""
          if [ -n "$IN" ]; then
            FILES="$IN"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            # 이번 푸시에서 "새로 추가된"(A) content JSON 만 게시 대상 (수정/재렌더는 재게시 안 함)
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              FILES=$(git diff --name-only --diff-filter=A "$BEFORE" "${{ github.sha }}" -- 'content/*.json' || true)
            fi
          fi
          echo "게시 대상:"; echo "${FILES:-(없음)}"
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 렌더 + 이미지 공개 + 인스타 게시
        if: steps.target.outputs.files != ''
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FILES: ${{ steps.target.outputs.files }}
        run: |
          set -euo pipefail
          git config --global user.email "actions@github.com"
          git config --global user.name "github-actions"

          # 1) 이미지 공개용 cards-cdn 가지 준비 (없으면 새로 만든다)
          rm -rf /tmp/cdn
          if git clone --depth 1 --branch cards-cdn "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/cdn 2>/dev/null; then
            echo "기존 cards-cdn 가지 사용"
          else
            git clone --depth 1 "https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git" /tmp/cdn
            ( cd /tmp/cdn && git checkout --orphan cards-cdn && git rm -rf . >/dev/null 2>&1 || true )
          fi

          # 2) 대상 파일 렌더 + 이미지 복사
          ISSUES=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "▶ 렌더: $f"
            node render.mjs "$f"
            ISSUE=$(node -e "const fs=require('fs'),p=require('path');const a=process.argv[1];process.stdout.write(JSON.parse(fs.readFileSync(a,'utf8')).issue||p.basename(a,'.json'))" "$f")
            echo "  issue=$ISSUE"
            mkdir -p "/tmp/cdn/$ISSUE"
            cp output/"$ISSUE"/card-*.png "/tmp/cdn/$ISSUE/"
            ISSUES="$ISSUES $ISSUE"
          done <<< "$FILES"

          # 3) 이미지 공개(cards-cdn push) — 변경 있을 때만
          ( cd /tmp/cdn
            git add -A
            if ! git diff --cached --quiet; then
              git commit -m "cdn: 카드 이미지 게시"
              git push origin cards-cdn
            else
              echo "cdn 변경 없음(이미 존재)"
            fi )

          # 4) 인스타 게시 (이슈별) — 이슈 이름엔 공백이 없으므로 단어 분리로 순회
          for ISSUE in $ISSUES; do
            ENC=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$ISSUE")
            BASE="https://raw.githubusercontent.com/${REPO}/cards-cdn/${ENC}"
            echo "▶ 인스타 게시: $ISSUE"
            node post-instagram.mjs "output/$ISSUE" "$BASE"
          done
