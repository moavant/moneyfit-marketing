name: 인스타 자동 게시

# content/ 에 새 카드뉴스 JSON 이 main 에 올라오면 → 렌더 → 이미지 공개(cards-cdn) → 인스타 캐러셀 자동 게시.
# 수동 실행(workflow_dispatch) 시 특정 파일 하나만 게시할 수 있다(첫 테스트용).
on:
  push:
    branches: [main]
    paths:
      - 'content/**'
  workflow_dispatch:
    inputs:
      issue:
        description: '게시할 content 파일 경로 (예: content/2026-W26-구독다이어트.json). 비우면 이번 푸시의 신규 추가분.'
        required: false

permissions:
  contents: write

concurrency:
  group: ig-publish
  cancel-in-progress: false

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: 의존성 설치 (Playwright + 크로미움)
        run: |
          npm install
          npx playwright install --with-deps chromium
      - name: 한국어 폰트 설치 (Pretendard / Noto Sans KR)
        run: |
          sudo apt-get update
          sudo apt-get install -y fonts-noto-cjk fonts-noto-color-emoji
          mkdir -p ~/.fonts
          curl -fsSL -o /tmp/pretendard.zip https://github.com/orioncactus/pretendard/releases/download/v1.3.9/Pretendard-1.3.9.zip || true
          if [ -f /tmp/pretendard.zip ]; then unzip -o /tmp/pretendard.zip -d /tmp/pretendard >/dev/null && find /tmp/pretendard -name '*.otf' -o -name '*.ttf' | xargs -I{} cp {} ~/.fonts/ 2>/dev/null || true; fi
          fc-cache -f

      - name: 게시 대상 결정
        id: target
        run: |
          IN="${{ github.event.inputs.issue }}"
          FILES=""
          if [ -n "$IN" ]; then
            FILES="$IN"
          elif [ "${{ github.event_name }}" = "push" ]; then
            BEFORE="${{ github.event.before }}"
            # 이번 푸시에서 "새로 추가된"(A) content JSON 만 게시 대상 (수정/재렌더는 재게시 안 함)
            if git cat-file -e "${BEFORE}^{commit}" 2>/dev/null; then
              FILES=$(git diff --name-only --diff-filter=A "$BEFORE" "${{ github.sha }}" -- 'content/*.json' || true)
            fi
          fi
          echo "게시 대상:"; echo "${FILES:-(없음)}"
          {
            echo "files<<EOF"
            echo "$FILES"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: 렌더 + 이미지 공개 + 인스타 게시
        if: steps.target.outputs.files != ''
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          FILES: ${{ steps.target.outputs.files }}
        run: |
          set -euo pipefail
          REMOTE="https://x-access-token:${GH_TOKEN}@github.com/${REPO}.git"
          WS="$GITHUB_WORKSPACE"

          # 1) 대상 파일 렌더
          ISSUES=""
          while IFS= read -r f; do
            [ -z "$f" ] && continue
            echo "▶ 렌더: $f"
            node render.mjs "$f"
            ISSUE=$(node -e "const fs=require('fs'),p=require('path');const a=process.argv[1];process.stdout.write(JSON.parse(fs.readFileSync(a,'utf8')).issue||p.basename(a,'.json'))" "$f")
            echo "  issue=$ISSUE"
            ISSUES="$ISSUES $ISSUE"
          done <<< "$FILES"

          # 2) cards-cdn 을 "이번 이미지만" 담은 새 orphan 으로 교체 (히스토리/누적 없음)
          rm -rf /tmp/cdn && mkdir -p /tmp/cdn && cd /tmp/cdn
          git init -q
          git config user.email "actions@github.com"
          git config user.name "github-actions"
          git checkout -q -b cards-cdn
          for ISSUE in $ISSUES; do
            mkdir -p "$ISSUE"
            cp "$WS/output/$ISSUE"/card-*.png "$ISSUE/"
          done
          git add -A
          git commit -qm "cdn: 게시용 임시 이미지"
          git push -qf "$REMOTE" cards-cdn
          cd "$WS"

          # 3) 인스타 게시 (이슈별; 실패하면 set -e 로 중단 → 4번 비우기 미실행 → 디버그/재시도 가능)
          for ISSUE in $ISSUES; do
            ENC=$(node -e "process.stdout.write(encodeURIComponent(process.argv[1]))" "$ISSUE")
            BASE="https://raw.githubusercontent.com/${REPO}/cards-cdn/${ENC}"
            echo "▶ 인스타 게시: $ISSUE"
            node post-instagram.mjs "output/$ISSUE" "$BASE"
          done

          # 4) 업로드 완료 → cards-cdn 비우기 (GitHub 용량 절약; 인스타 게시물엔 영향 없음)
          cd /tmp/cdn
          git rm -rqf . >/dev/null 2>&1 || true
          printf '%s\n' "인스타 업로드 완료 후 자동 비움 — 카드 이미지는 여기 보관하지 않습니다." > README.md
          git add -A
          git commit -qm "cdn: 업로드 완료 — 이미지 삭제"
          git push -qf "$REMOTE" cards-cdn
          echo "✅ 게시 + cards-cdn 비우기 완료"
